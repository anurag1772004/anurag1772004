# OPTIONAL EXTRA: animated contribution "snake"
# Place this file at:  .github/workflows/snake.yml  in your anurag1772004 repo.
# It runs every 12h, builds the snake SVG, and pushes it to the `output` branch.
# Then add this to your profile README where you want the snake to appear:
#
#   <img src="https://raw.githubusercontent.com/anurag1772004/anurag1772004/output/github-contribution-grid-snake-dark.svg" alt="snake" width="100%" />
#
name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake SVGs
        uses: Platane/snk@v3
        with:
          github_user_name: anurag1772004
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
